# Kafka 3-브로커 KRaft 클러스터 학습 환경
# - 브로커 3개가 각각 broker + controller 역할을 겸한다 (combined mode).
# - KRaft quorum: 3개 중 과반(2개) 투표로 리더 선출 → 1개 장애 허용 (홀수로 split-brain 방지).
# - CLUSTER_ID: 모든 브로커가 동일해야 한다.
#
# 포트 매핑 (호스트:컨테이너)
#   kafka-1: 9092:9092
#   kafka-2: 9094:9092
#   kafka-3: 9095:9092

services:
  kafka-1:
    image: apache/kafka:3.7.0
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      # quorum voters: 3개 컨트롤러 전체 등록 (홀수 → split-brain 방지)
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093
      - KAFKA_LISTENERS=INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=INTERNAL://kafka-1:29092,EXTERNAL://localhost:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL
      # 모든 브로커에 동일한 CLUSTER_ID 필수
      - KAFKA_CLUSTER_ID=_ylp8HbfTJupBfiKFBj97A
      # 학습 목적: 토픽은 앱 기동 시 KafkaConfig에서 명시적으로 생성
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=false
      # 내부 시스템 토픽(__consumer_offsets 등)도 RF=3 적용
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=3
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=3
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=2
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      # 학습 포인트: ISR이 min.insync.replicas(2) 미만이면 produce 거부 → 데이터 유실 차단
      - KAFKA_MIN_INSYNC_REPLICAS=2
      # 학습 포인트: false → ISR 미달 시 리더 선출 차단 (데이터 일관성 우선)
      - KAFKA_UNCLEAN_LEADER_ELECTION_ENABLE=false
    volumes:
      - kafka_1_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 15

  kafka-2:
    image: apache/kafka:3.7.0
    ports:
      - "9094:9092"
    environment:
      - KAFKA_NODE_ID=2
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093
      - KAFKA_LISTENERS=INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=INTERNAL://kafka-2:29092,EXTERNAL://localhost:9094
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_CLUSTER_ID=_ylp8HbfTJupBfiKFBj97A
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=false
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=3
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=3
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=2
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      - KAFKA_MIN_INSYNC_REPLICAS=2
      - KAFKA_UNCLEAN_LEADER_ELECTION_ENABLE=false
    volumes:
      - kafka_2_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 15

  kafka-3:
    image: apache/kafka:3.7.0
    ports:
      - "9095:9092"
    environment:
      - KAFKA_NODE_ID=3
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093
      - KAFKA_LISTENERS=INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=INTERNAL://kafka-3:29092,EXTERNAL://localhost:9095
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_CLUSTER_ID=_ylp8HbfTJupBfiKFBj97A
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=false
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=3
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=3
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=2
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      - KAFKA_MIN_INSYNC_REPLICAS=2
      - KAFKA_UNCLEAN_LEADER_ELECTION_ENABLE=false
    volumes:
      - kafka_3_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 15

  notification-producer-db:
    profiles: ["notification"]
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: notification_producer
      POSTGRES_USER: notification
      POSTGRES_PASSWORD: notification
    ports:
      - "5432:5432"
    volumes:
      - notification_producer_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notification -d notification_producer"]
      interval: 5s
      timeout: 5s
      retries: 10

  notification-worker-db:
    profiles: ["notification"]
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: notification_worker
      POSTGRES_USER: notification
      POSTGRES_PASSWORD: notification
    ports:
      - "5433:5432"
    volumes:
      - notification_worker_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notification -d notification_worker"]
      interval: 5s
      timeout: 5s
      retries: 10

  notification-producer-app:
    profiles: ["notification"]
    build:
      context: .
      dockerfile: docker/notification-app.Dockerfile
      args:
        MODULE_NAME: notification-producer-app
    environment:
      # 3개 브로커 모두 등록: 1개 다운 시에도 bootstrap 성공
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka-1:29092,kafka-2:29092,kafka-3:29092
      SERVER_PORT: 8082
      SPRING_DATASOURCE_URL: jdbc:postgresql://notification-producer-db:5432/notification_producer
      SPRING_DATASOURCE_USERNAME: notification
      SPRING_DATASOURCE_PASSWORD: notification
    ports:
      - "8082:8082"
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
      notification-producer-db:
        condition: service_healthy
    restart: on-failure

  notification-worker-app:
    profiles: ["notification"]
    build:
      context: .
      dockerfile: docker/notification-app.Dockerfile
      args:
        MODULE_NAME: notification-worker-app
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka-1:29092,kafka-2:29092,kafka-3:29092
      APP_NOTIFICATION_RETRY_BACKOFF_MILLIS: 100
      SPRING_DATASOURCE_URL: jdbc:postgresql://notification-worker-db:5432/notification_worker
      SPRING_DATASOURCE_USERNAME: notification
      SPRING_DATASOURCE_PASSWORD: notification
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
      notification-worker-db:
        condition: service_healthy
    restart: on-failure

volumes:
  kafka_1_data:
  kafka_2_data:
  kafka_3_data:
  notification_producer_db_data:
  notification_worker_db_data:
