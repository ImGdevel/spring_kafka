server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: notification-producer-app
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/notification_producer}
    username: ${SPRING_DATASOURCE_USERNAME:notification}
    password: ${SPRING_DATASOURCE_PASSWORD:notification}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092,localhost:9094,localhost:9095}
    consumer:
      group-id: ${SPRING_KAFKA_CONSUMER_GROUP_ID:notification-producer-query-group}
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.study.notification.contract,com.study.notification.domain
        # Pillar 5: sent/failed 이벤트는 Worker TX 커밋 이후에만 읽는다
        isolation.level: read_committed
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      # Pillar 1 (개선): Outbox 릴레이가 Kafka TX로 send + markPublished를 원자화한다.
      # TX 커밋 전 메시지는 read_committed 소비자에게 보이지 않으므로
      # "send 성공 + markPublished 실패 → 중복 발행" 시나리오를 차단한다.
      transaction-id-prefix: ${APP_NOTIFICATION_OUTBOX_TX_ID_PREFIX:notification-outbox-tx-}
      # Pillar 5: 프로듀서 멱등성 — 브로커가 중복 배치를 탐지하여 정확히 1회 기록한다
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
    admin:
      fail-fast: false
    listener:
      missing-topics-fatal: false

app:
  notification:
    producer:
      allowed-channels:
        - EMAIL
        - SLACK
    query:
      consumer-group: ${APP_NOTIFICATION_QUERY_CONSUMER_GROUP:notification-producer-query-group}
    outbox:
      poll-interval-ms: ${APP_NOTIFICATION_OUTBOX_POLL_INTERVAL_MS:1000}
      batch-size: ${APP_NOTIFICATION_OUTBOX_BATCH_SIZE:100}
