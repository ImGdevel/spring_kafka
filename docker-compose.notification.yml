services:
  kafka:
    image: apache/kafka:3.7.0
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_LISTENERS=INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
    volumes:
      - kafka_notification_data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10

  postgres-producer:
    image: postgres:16
    environment:
      POSTGRES_DB: notification_producer
      POSTGRES_USER: notification
      POSTGRES_PASSWORD: notification
    ports:
      - "5432:5432"
    volumes:
      - postgres_producer_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notification -d notification_producer"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-worker:
    image: postgres:16
    environment:
      POSTGRES_DB: notification_worker
      POSTGRES_USER: notification
      POSTGRES_PASSWORD: notification
    ports:
      - "5433:5432"
    volumes:
      - postgres_worker_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notification -d notification_worker"]
      interval: 5s
      timeout: 5s
      retries: 10

  notification-producer-app:
    build:
      context: .
      dockerfile: docker/notification-app.Dockerfile
      args:
        MODULE_NAME: notification-producer-app
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SERVER_PORT: 8082
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-producer:5432/notification_producer
      SPRING_DATASOURCE_USERNAME: notification
      SPRING_DATASOURCE_PASSWORD: notification
    ports:
      - "8082:8082"
    depends_on:
      kafka:
        condition: service_healthy
      postgres-producer:
        condition: service_healthy
    restart: on-failure

  notification-worker-app:
    build:
      context: .
      dockerfile: docker/notification-app.Dockerfile
      args:
        MODULE_NAME: notification-worker-app
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      APP_NOTIFICATION_RETRY_BACKOFF_MILLIS: 100
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-worker:5432/notification_worker
      SPRING_DATASOURCE_USERNAME: notification
      SPRING_DATASOURCE_PASSWORD: notification
    depends_on:
      kafka:
        condition: service_healthy
      postgres-worker:
        condition: service_healthy
    restart: on-failure

volumes:
  kafka_notification_data:
  postgres_producer_data:
  postgres_worker_data:
